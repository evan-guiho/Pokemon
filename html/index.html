<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>PokéFinder</title>
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <header>
            <div>
                <img src="./webp/images/pokeball_icon.jpg" alt="icon pokeball">
                <h1>PokéFinder</h1>
            </div>
            
            <textarea id="pokemonName" placeholder="Entrez le nom d'un Pokémon"></textarea>
        </header>
        <main>
            <h1>Bienvenue dans le PokéDex</h1>

            <button id="toggleFiltre">Filtres</button>
            <div id="filtres">
                <h2>Recherche Avancé</h2>
                <select id="contenanceType">
                    <option value="contient">Contient un de ces types</option>
                    <option value="seulement">Seulement un de ces types</option>
                </select>
                <div id="filtreTypes"></div>

                <div id="filtreAttaque">
                    <h3>Attaques rapides</h3>
                    <input type="text" id="searchAttaque" placeholder="Rechercher une attaque...">
                    <ul id="suggestionsAttaque"></ul>
                    <div id="selectedAttaques"></div>
                </div>
            </div>
            <h3 id="nbPokemons">0 Pokémon trouvé</h3>
            <button class="precedent" >Préc</button>
            <button class="suivant" >Suiv</button>
            <!-- Tableau pour afficher les pokémons -->
            <table>
                <thead>
                    <tr>
                        <th>Numéro</th>
                        <th>Sprite</th>
                        <th>Nom</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <!-- Corps du tableau où les pokémons seront insérés -->
                <tbody id="AllPokemonsTable">
                    
                </tbody>
            </table>
            
            <button class="precedent" >Préc</button>
            <button class="suivant" >Suiv</button>
        </main>
        <!-- Popup pour afficher les détails d'un pokémon -->
        <div id="popup">
            <div id="popupContent">
                <button id="closePopup">X</button>

                <!-- Boutons de navigation pour passer au pokémon précédent/suivant -->
                <div id="naviPopup">
                    <button id="prevPopup">Préc</button>
                    <button id="nextPopup">Suiv</button>
                </div>

                <!-- Section pour le nom du pokémon et les boutons de switch entre sprite et 3D -->
                <div id="NomImgChoixPopup">
                    <h2 id="popupNom"></h2>
                    <button id="toggleSprite">Sprite</button>
                    <button id="toggle3d">3D</button>
                </div>

                <!-- Boutons pour switcher entre les deux vues -->
                <div id="tabsPopup">
                    <button id="btnApercu" class="tabActive">Aperçu</button>
                    <button id="btnAtk">Atk connues</button>
                </div>

                <!-- Vue Aperçu -->
                <div id="infoPoke">
                    <img id="popupSprite">
                    <div id="infoPokeText">
                        <p id="popupAtk">Attaque : </p>
                        <p id="popupDef">Défense : </p>
                        <p id="popupSta">Endurance : </p>
                        <p id="popupType">Type : </p>
                    </div>
                    
                </div>

                <!-- Vue Attaques connues -->
                <div id="atkConnu">
                    <h3>Attaques rapides</h3>
                    <div id="atkRapides"></div>
                    <h3>Attaques chargées</h3>
                    <div id="atkChargees"></div>
                </div>

                <!-- Section pour les faiblesses aux types -->
                <h2>Faiblesses aux types</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Multiplicateur de dégâts</th>
                        </tr>
                    </thead>
                    <tbody id="faiblessesTable"></tbody>
                </table>
            </div>
        </div>
        <footer>

        </footer>
    </body>
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="data/fast_moves.js"></script>
    <script src="data/charged_moves.js"></script>
    <script src="data/pokemons.js"></script>
    <script src="data/pokemon_moves.js"></script>
    <script src="data/type_effectiveness.js"></script>
    <script src="data/pokemon_types.js"></script>
    <script src="data/class_type.js"></script>
    <script src="data/class_attack.js"></script>
    <script src="data/class_pokemon.js"></script>
    <script src="data/partie_tests.js"></script>
    <script src="js/script.js"></script>
</html>
